# Alembic configuration for Insider Scanner.
#
# The actual database URL is loaded from the DATABASE_URL environment variable
# inside migrations/env.py — do NOT hardcode it here.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder; overridden by env.py via os.environ["DATABASE_URL"].
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
