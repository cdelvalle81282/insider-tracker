<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Insider Tracker{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            sans:    ['"IBM Plex Sans"', 'sans-serif'],
            mono:    ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* ── Design tokens ───────────────────────────── */
    :root {
      --bg-base:     #06090f;
      --bg-surface:  #0b1220;
      --bg-raised:   #0f1a2c;
      --border:      #182540;
      --border-dim:  #0e1825;
      --text-1: #dde4f0;
      --text-2: #566882;
      --text-3: #2c3f58;
      --buy:    #0fcea0;
      --sell:   #f64b6e;
      --amber:  #f59e0b;
      --sky:    #38bdf8;
    }

    /* ── Base ───────────────────────────────────── */
    html { background: var(--bg-base); }

    body {
      background-color: var(--bg-base);
      background-image:
        radial-gradient(ellipse 70% 50% at 8% 65%,  rgba(56,189,248,.022)  0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 92% 12%, rgba(15,206,160,.016)  0%, transparent 50%);
      min-height: 100vh;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text-1);
    }

    /* Subtle dot grid atmosphere */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    nav, main { position: relative; z-index: 1; }

    /* ── Nav ─────────────────────────────────────── */
    nav {
      background: rgba(6,9,15,.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(56,189,248,.05);
    }

    .nav-link {
      font-size: .68rem; font-weight: 500; letter-spacing: .09em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 5px; color: var(--text-2);
      transition: color .15s, background .15s;
    }
    .nav-link:hover { color: var(--text-1); background: rgba(255,255,255,.055); }
    .nav-link.active { color: var(--text-1); background: rgba(255,255,255,.08); }

    /* ── Typography ─────────────────────────────── */
    .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

    /* ── Surfaces ───────────────────────────────── */
    .surface  { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; }
    .surface-r { background: var(--bg-raised);  border: 1px solid var(--border); border-radius: 10px; }

    /* ── Section headings ───────────────────────── */
    .sh {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: .63rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
    }
    .sh-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Details caret — rotate on open */
    summary { list-style: none; }
    summary::-webkit-details-marker { display: none; }
    .caret {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; font-size: .55rem;
      color: var(--text-3); transition: transform .15s; flex-shrink: 0;
    }
    details[open] > summary .caret { transform: rotate(90deg); }

    /* ── Table rows ──────────────────────────────── */
    .row-buy  { border-left: 2px solid var(--buy); }
    .row-sell { border-left: 2px solid var(--sell); }
    .row-buy.conviction-high {
      background: linear-gradient(90deg, rgba(15,206,160,.055) 0%, transparent 18%);
    }
    .row-dimmed { opacity: .35; }
    tr:hover td { background: rgba(255,255,255,.022); }

    /* ── Score badges ───────────────────────────── */
    .score {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 5px; border: 1px solid;
      font-family: 'JetBrains Mono', monospace; font-size: .65rem; font-weight: 700;
    }
    .score-high   { color: var(--buy);   background: rgba(15,206,160,.12); border-color: rgba(15,206,160,.32); box-shadow: 0 0 8px rgba(15,206,160,.2); }
    .score-medium { color: var(--amber); background: rgba(245,158,11,.1);  border-color: rgba(245,158,11,.28); }
    .score-low    { color: var(--text-3); background: rgba(14,24,40,.7);   border-color: var(--border); }

    /* ── KPI stat cards ─────────────────────────── */
    .kpi { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
    .kpi-label { font-size: .58rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 5px; }
    .kpi-val   { font-family: 'JetBrains Mono', monospace; font-size: 1.05rem; font-weight: 700; line-height: 1; }
    .kpi-sub   { font-family: 'JetBrains Mono', monospace; font-size: .62rem; color: var(--text-2); margin-top: 4px; }

    /* ── Filter bar ─────────────────────────────── */
    .fg {
      display: flex; align-items: center; height: 32px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0 10px; gap: 8px;
    }
    .fg-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
    .fg-label { font-size: .58rem; font-weight: 600; letter-spacing: .11em; text-transform: uppercase; color: var(--text-3); white-space: nowrap; }
    .fg-in {
      background: transparent; border: none; outline: none;
      font-family: 'IBM Plex Sans', sans-serif; font-size: .8rem; color: var(--text-1);
    }
    .fg-in::placeholder { color: var(--text-3); }
    .fg-in option { background: var(--bg-raised); color: var(--text-1); }

    .fg-toggle {
      cursor: pointer;
      user-select: none;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      font-size: .68rem;
      color: var(--text-2);
      list-style: none;
      white-space: nowrap;
    }
    .fg-toggle::-webkit-details-marker { display: none; }
    .fg-panel { width: 100%; flex-basis: 100%; }
    .fg-panel[open] > summary.fg-toggle { color: var(--text-1); border-color: var(--sky); }
    .fg-badge {
      background: var(--sky);
      color: #fff;
      padding: 0 5px;
      border-radius: 8px;
      font-size: .55rem;
      margin-left: 4px;
      vertical-align: middle;
    }
    .fg-panel-body { padding: 8px 0 4px; }

    /* Preset chips */
    .chip {
      font-size: .62rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 5px; cursor: pointer; transition: all .12s;
      border: 1px solid transparent; color: var(--text-2); background: transparent;
    }
    .chip:hover { color: var(--text-1); border-color: var(--border); }
    .chip.active { color: var(--text-1); background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.14); }

    /* Mode segmented control */
    .seg-wrap {
      display: flex; height: 32px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 3px; gap: 2px;
    }
    .seg {
      font-size: .62rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
      padding: 0 12px; border-radius: 5px; cursor: pointer; transition: all .15s;
      border: 1px solid transparent; color: var(--text-2); background: transparent;
      display: flex; align-items: center; white-space: nowrap;
    }
    .seg:hover { color: var(--text-1); }
    .seg.active-both  { color: var(--text-1); background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.12); }
    .seg.active-buys  { color: var(--buy);   background: rgba(15,206,160,.12);  border-color: rgba(15,206,160,.28); }
    .seg.active-sells { color: var(--sell);  background: rgba(246,75,110,.12);  border-color: rgba(246,75,110,.28); }

    /* Export button */
    .btn-ghost {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: .62rem; font-weight: 600; letter-spacing: .09em; text-transform: uppercase;
      height: 32px; padding: 0 14px; border-radius: 8px; cursor: pointer; transition: all .12s;
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-2);
    }
    .btn-ghost:hover { color: var(--text-1); border-color: rgba(255,255,255,.2); }

    /* ── Tables ─────────────────────────────────── */
    .tbl-wrap { border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
    .th {
      padding: 9px 12px; font-size: .58rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-3); white-space: nowrap; user-select: none;
      background: var(--bg-raised);
    }
    .th.sort { cursor: pointer; }
    .th.sort:hover { color: var(--text-2); }
    .td { padding: 8px 12px; font-size: .8rem; border-top: 1px solid var(--border-dim); }

    .ticker-link {
      font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: .75rem;
      letter-spacing: .03em; transition: color .12s;
    }
    .watched-star { color: var(--amber); font-size: .58rem; vertical-align: super; margin-left: 2px; }
    .plan-badge {
      font-size: .55rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      padding: 1px 5px; border-radius: 3px;
      background: rgba(30,40,60,.9); color: var(--text-2); border: 1px solid var(--border);
    }

    /* ── Cluster cards ──────────────────────────── */
    .cc { border-radius: 10px; border: 1px solid; overflow: hidden; transition: box-shadow .18s; }
    .cc-buy   { border-color: rgba(15,206,160,.2);  background: rgba(15,206,160,.03); }
    .cc-sell  { border-color: rgba(246,75,110,.2);  background: rgba(246,75,110,.03); }
    .cc-mixed { border-color: rgba(245,158,11,.2);  background: rgba(245,158,11,.025); }
    .cc-buy:hover   { box-shadow: 0 0 0 1px rgba(15,206,160,.14), 0 6px 28px rgba(15,206,160,.07); }
    .cc-sell:hover  { box-shadow: 0 0 0 1px rgba(246,75,110,.14), 0 6px 28px rgba(246,75,110,.07); }
    .cc-mixed:hover { box-shadow: 0 0 0 1px rgba(245,158,11,.14), 0 6px 28px rgba(245,158,11,.05); }

    /* Cluster filter buttons */
    .cff {
      font-size: .62rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 5px; cursor: pointer; transition: all .12s;
      border: 1px solid var(--border); background: transparent; color: var(--text-2);
    }
    .cff:hover { color: var(--text-1); }
    .cff[data-active="1"]        { background: rgba(255,255,255,.09); color: var(--text-1); border-color: rgba(255,255,255,.18); }
    .cff-buy[data-active="1"]    { background: rgba(15,206,160,.12);  color: var(--buy);   border-color: rgba(15,206,160,.3);  }
    .cff-sell[data-active="1"]   { background: rgba(246,75,110,.12);  color: var(--sell);  border-color: rgba(246,75,110,.3);  }
    .cff-mixed[data-active="1"]  { background: rgba(245,158,11,.12);  color: var(--amber); border-color: rgba(245,158,11,.3);  }

    /* ── Filing detail cards ─────────────────────── */
    .detail-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .detail-label { font-size: .58rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 3px; }
    .detail-val   { color: var(--text-1); font-size: .85rem; }
    .role-badge   { font-size: .6rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; background: rgba(30,42,65,.9); color: var(--text-2); border: 1px solid var(--border); }

    /* ── Entry animation ────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeUp .22s ease both; }

    #filings-container { transition: opacity .12s ease; }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #253450; }

    /* ── Misc components ─────────────────────────── */
    .pct-hot { color: var(--amber); }
    .pct-dim { color: var(--text-3); }

    .lag-badge {
        display: inline-block;
        font-size: .55rem;
        font-weight: 600;
        padding: 1px 5px;
        border-radius: 6px;
        margin-top: 2px;
        line-height: 1.2;
    }
    .lag-hot  { background: rgba(15,206,160,.12); color: var(--buy);   border: 1px solid rgba(15,206,160,.28); }
    .lag-warm { background: rgba(245,158,11,.12); color: var(--amber);  border: 1px solid rgba(245,158,11,.28); }
    .lag-late { background: rgba(246,75,110,.12); color: var(--sell);  border: 1px solid rgba(246,75,110,.28); }
    .perf-pct { font-size: .58rem; font-weight: 600; line-height: 1.2; margin-top: 1px; }
    .perf-pos { color: var(--buy); }
    .perf-neg { color: var(--sell); }

    /* Daily summary table */
    .ds-table td, .ds-table th { padding: 7px 12px; }
    .ds-table tbody tr:hover td { background: rgba(255,255,255,.02); }

    /* Warning banner */
    .warn-banner {
      background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.25);
      border-radius: 10px; padding: 14px 18px;
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="sticky top-0 z-50">
    <div class="max-w-screen-2xl mx-auto px-5 h-12 flex items-center gap-8">

      <a href="/" class="flex items-center gap-2.5 shrink-0 no-underline">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M7 0L8.8 4.8L14 7L8.8 9.2L7 14L5.2 9.2L0 7L5.2 4.8Z" fill="#38bdf8"/>
        </svg>
        <span style="font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:.2em; color:var(--text-1);">INSIDER TRACKER</span>
      </a>

      <div class="flex gap-1">
        <a href="/"          class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a>
        <a href="/watchlist" class="nav-link {% block nav_watchlist %}{% endblock %}">Watchlist</a>
        <a href="/congress"  class="nav-link {% block nav_congress %}{% endblock %}">Congress</a>
        <a href="/backtest"  class="nav-link {% block nav_backtest %}{% endblock %}">Backtest</a>
        <a href="/run-log"   class="nav-link {% block nav_runlog %}{% endblock %}">Run Log</a>
        <a href="/logic"     class="nav-link {% block nav_logic %}{% endblock %}">Config</a>
      </div>

      <div class="ml-auto">
        <div id="loading-indicator" style="opacity:0; transition:opacity .18s; display:flex; align-items:center; gap:6px; color:var(--sky);">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--sky);display:inline-block;" class="animate-ping"></span>
          <span style="font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;">Loading</span>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-screen-2xl mx-auto px-5 py-6">
    {% block content %}{% endblock %}
  </main>

  <script>
    // HTMX loading indicator
    document.addEventListener('htmx:beforeRequest', () => {
      const ind = document.getElementById('loading-indicator');
      const fc  = document.getElementById('filings-container');
      if (ind) ind.style.opacity = '1';
      if (fc)  fc.style.opacity  = '.45';
    });
    document.addEventListener('htmx:afterSettle', () => {
      const ind = document.getElementById('loading-indicator');
      const fc  = document.getElementById('filings-container');
      if (ind) ind.style.opacity = '0';
      if (fc)  fc.style.opacity  = '1';
    });
  </script>

</body>
</html>
