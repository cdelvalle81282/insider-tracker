<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Insider Tracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            buy:  { DEFAULT: '#16a34a', light: '#dcfce7', border: '#86efac' },
            sell: { DEFAULT: '#dc2626', light: '#fee2e2', border: '#fca5a5' },
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none; }
    .row-buy  { border-left: 3px solid #16a34a; }
    .row-sell { border-left: 3px solid #dc2626; }
    .row-dimmed { opacity: 0.45; }
  </style>
</head>
<body class="h-full text-gray-100 font-sans">

  <!-- Nav -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-screen-2xl mx-auto px-4 flex items-center gap-6 h-12">
      <a href="/" class="text-white font-bold tracking-tight text-sm">📈 Insider Tracker</a>
      <div class="flex gap-1 ml-2">
        <a href="/"          class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a>
        <a href="/watchlist" class="nav-link {% block nav_watchlist %}{% endblock %}">Watchlist</a>
        <a href="/run-log"   class="nav-link {% block nav_runlog %}{% endblock %}">Run Log</a>
        <a href="/logic"     class="nav-link {% block nav_logic %}{% endblock %}">Logic &amp; Config</a>
      </div>
    </div>
  </nav>

  <style>
    .nav-link {
      @apply px-3 py-1 rounded text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition-colors;
    }
    .nav-link.active {
      @apply text-white bg-gray-800;
    }
  </style>

  <main class="max-w-screen-2xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
